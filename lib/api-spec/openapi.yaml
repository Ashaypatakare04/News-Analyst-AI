openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AgenticNews API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: news
    description: News operations
  - name: ai
    description: AI operations
  - name: upload
    description: Upload operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /news:
    get:
      operationId: getNews
      tags: [news]
      summary: Fetch latest news
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: News category
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /news/{id}:
    get:
      operationId: getArticle
      tags: [news]
      summary: Get a single article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news/{id}/summarize:
    post:
      operationId: summarizeArticle
      tags: [ai]
      summary: Generate AI summary for an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"

  /news/{id}/verify:
    post:
      operationId: verifyArticle
      tags: [ai]
      summary: Verify claims in an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResponse"

  /news/{id}/audio:
    post:
      operationId: generateAudio
      tags: [ai]
      summary: Generate podcast-style audio for an article summary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audio generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioResponse"

  /news/{id}/translate:
    post:
      operationId: translateArticle
      tags: [ai]
      summary: Translate article to target language
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "200":
          description: Translated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"

  /ask:
    post:
      operationId: askQuestion
      tags: [ai]
      summary: Ask a question about news using RAG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskRequest"
      responses:
        "200":
          description: AI answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskResponse"

  /upload:
    post:
      operationId: uploadArticle
      tags: [upload]
      summary: Upload newspaper image for OCR
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
                - image
      responses:
        "200":
          description: OCR and AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /categories:
    get:
      operationId: getCategories
      tags: [news]
      summary: Get available news categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        content:
          type: string
        url:
          type: string
        imageUrl:
          type: string
          nullable: true
        source:
          type: string
        author:
          type: string
          nullable: true
        publishedAt:
          type: string
        category:
          type: string
        aiSummary:
          type: string
          nullable: true
        bulletPoints:
          type: array
          items:
            type: string
          nullable: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
          nullable: true
        trustScore:
          type: string
          nullable: true
          enum: [Low, Medium, High, null]
        trustDetails:
          $ref: "#/components/schemas/TrustDetails"
          nullable: true
        audioUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - content
        - url
        - source
        - publishedAt
        - category
        - createdAt

    TimelineEvent:
      type: object
      properties:
        date:
          type: string
        event:
          type: string
      required:
        - date
        - event

    TrustDetails:
      type: object
      properties:
        score:
          type: string
          enum: [Low, Medium, High]
        reasoning:
          type: string
        sources:
          type: array
          items:
            type: string
        contradictions:
          type: array
          items:
            type: string
      required:
        - score
        - reasoning
        - sources
        - contradictions

    NewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/Article"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      required:
        - articles
        - total
        - page
        - pageSize

    SummaryResponse:
      type: object
      properties:
        summary:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
      required:
        - summary
        - bulletPoints
        - timeline

    VerificationResponse:
      type: object
      properties:
        trustScore:
          type: string
          enum: [Low, Medium, High]
        reasoning:
          type: string
        sources:
          type: array
          items:
            type: string
        contradictions:
          type: array
          items:
            type: string
      required:
        - trustScore
        - reasoning
        - sources
        - contradictions

    AudioResponse:
      type: object
      properties:
        audioUrl:
          type: string
        message:
          type: string
      required:
        - audioUrl
        - message

    TranslateRequest:
      type: object
      properties:
        targetLanguage:
          type: string
      required:
        - targetLanguage

    TranslateResponse:
      type: object
      properties:
        translatedTitle:
          type: string
        translatedContent:
          type: string
        language:
          type: string
      required:
        - translatedTitle
        - translatedContent
        - language

    AskRequest:
      type: object
      properties:
        question:
          type: string
        conversationHistory:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - question

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    AskResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/ArticleReference"
      required:
        - answer
        - sources

    ArticleReference:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        source:
          type: string
        url:
          type: string
      required:
        - id
        - title
        - source
        - url

    UploadResponse:
      type: object
      properties:
        extractedText:
          type: string
        summary:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
        insights:
          type: string
      required:
        - extractedText
        - summary
        - bulletPoints
        - insights

    CategoriesResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            type: string
      required:
        - categories

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
