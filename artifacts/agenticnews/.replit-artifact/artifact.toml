kind = "web"
previewPath = "/"
title = "AgenticNews"
version = "1.0.0"
id = "artifacts/agenticnews"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20427
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agenticnews run dev"

[services.env]
PORT = "20427"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agenticnews", "run", "build"]
publicDir = "artifacts/agenticnews/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
